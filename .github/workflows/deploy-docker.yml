# ============================================================
# Enterprise Knowledge Hub — GitHub Actions Docker Deploy Pipeline
# Build and push Docker images, deploy to self-hosted via SSH
# ============================================================

name: Deploy via Docker

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker/**'
      - '.github/workflows/deploy-docker.yml'
  
  workflow_dispatch:

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ekh-backend
  FRONTEND_IMAGE: ekh-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/backend.tar

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/frontend.tar

      - name: Load backend image
        run: docker load --input /tmp/backend.tar

      - name: Load frontend image
        run: docker load --input /tmp/frontend.tar

      - name: Test backend image
        run: |
          docker run --rm ${{ env.BACKEND_IMAGE }}:${{ github.sha }} python -m py_compile app/main.py
          echo "Backend image validation passed"

      - name: Test frontend image
        run: |
          docker run --rm ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} test -f /usr/share/nginx/html/index.html
          echo "Frontend image validation passed"

      - name: Upload artifact (optional)
        if: failure()
        run: |
          echo "Build failed. Check logs above."
          exit 1

  deploy-to-server:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deployment config
        id: check-config
        env:
          DEPLOY_SERVER_VAL: ${{ vars.DEPLOY_SERVER }}
          DEPLOY_USER_VAL: ${{ vars.DEPLOY_USER }}
          DEPLOY_PORT_VAL: ${{ vars.DEPLOY_PORT }}
          DEPLOY_PATH_VAL: ${{ vars.DEPLOY_PATH }}
        run: |
          if [ -z "$DEPLOY_SERVER_VAL" ]; then
            echo "::info::DEPLOY_SERVER not configured. Skipping deployment."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "server=$DEPLOY_SERVER_VAL" >> $GITHUB_OUTPUT
            echo "user=${DEPLOY_USER_VAL:-deploy}" >> $GITHUB_OUTPUT
            echo "port=${DEPLOY_PORT_VAL:-22}" >> $GITHUB_OUTPUT
            echo "path=${DEPLOY_PATH_VAL:-/opt/knowledge-hub}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        if: steps.check-config.outputs.configured == 'true'
        uses: appleboy/ssh-action@master
        continue-on-error: true
        with:
          host: ${{ steps.check-config.outputs.server }}
          username: ${{ steps.check-config.outputs.user }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ steps.check-config.outputs.port }}
          script: |
            DEPLOY_PATH="${{ steps.check-config.outputs.path }}"
            cd "$DEPLOY_PATH"
            
            # Pull latest images
            docker pull ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} || echo "Note: Images must be pushed to registry first"
            docker pull ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} || echo "Note: Images must be pushed to registry first"
            
            # Stop existing containers
            docker compose down || true
            
            # Start new containers
            docker compose -f docker-compose.yml up -d
            
            # Wait and check health
            sleep 10
            docker compose logs
            
            echo "Deployment complete"

  notify:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-to-server]
    if: always()

    steps:
      - name: Build Status
        run: |
          echo "Build: ${{ needs.build-and-push.result }}"
          echo "Deploy: ${{ needs.deploy-to-server.result }}"
          
          if [ "${{ needs.build-and-push.result }}" = "failure" ]; then
            echo "::error::Build failed"
            exit 1
          fi
