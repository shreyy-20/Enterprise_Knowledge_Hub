# ============================================================
# Enterprise Knowledge Hub — Prometheus Configuration
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ── API Service Metrics ───────────────────────────────────
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "knowledge-hub-api"
          environment: "production"

  # ── Prometheus Self-Monitoring ────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
